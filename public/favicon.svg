<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    circle, line { stroke: #111; }
    circle:last-of-type { fill: #111; stroke: none; }
    @media (prefers-color-scheme: dark) {
      circle, line { stroke: #fff; }
      circle:last-of-type { fill: #fff; stroke: none; }
    }
  </style>
  <circle cx="50" cy="50" r="35" stroke-width="4" fill="none" />
  <circle cx="50" cy="50" r="6" />
  <line x1="50" y1="50" x2="85" y2="50" stroke-width="4" stroke-linecap="round"/>
</svg>